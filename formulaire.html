<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mise à jour des interventions</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script>
        function soumettreFormulaire() {
            const departement = document.getElementById("departement").value;
            const codePostal = document.getElementById("codePostal").value;
            const ville = document.getElementById("ville").value;
            const agence = document.getElementById("agence").value;
            const actif = document.getElementById("actif").value;

            // URL de ton script Google Apps Script (voir étape b)
            const scriptUrl = 'https://script.google.com/macros/s/AKfycbzJ23W9iLe1dMVv3Qt4DMGNSAr0wpxJP0CDWQySWL4yxz5cnGzFHG9nB_Ny_Gm_vwsfrQ/exec';

            $.ajax({
                url: scriptUrl,
                type: 'POST',
                data: {
                    departement: departement,
                    codePostal: codePostal,
                    ville: ville,
                    agence: agence,
                    actif: actif
                },
                success: function(response) {
                    alert("Mise à jour réussie !");
                },
                error: function(error) {
                    alert("Erreur lors de la mise à jour.");
                }
            });
        }
    </script>
</head>
<body>
    <h1>Mettre à jour les interventions</h1>
    <form onsubmit="event.preventDefault(); soumettreFormulaire();">
        <label for="departement">Département :</label>
        <input type="text" id="departement" required><br>

        <label for="codePostal">Code Postal :</label>
        <input type="text" id="codePostal" required><br>

        <label for="ville">Ville :</label>
        <input type="text" id="ville" required><br>

        <label for="agence">Agence :</label>
        <input type="text" id="agence"><br>

        <label for="actif">Actif (Oui/Non) :</label>
        <select id="actif" required>
            <option value="Oui">Oui</option>
            <option value="Non">Non</option>
        </select><br>

        <button type="submit">Mettre à jour</button>
    </form>
</body>
</html>
