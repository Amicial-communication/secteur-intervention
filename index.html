<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recherche par Code Postal - Amicial</title>
    <link rel="preload" href="logo_f193670e633a220d12e109007ca43583.svg" as="image">
    <style>
        body {
            font-family: 'Open Sans', Arial, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f8f9fa;
            color: #333;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        h1 {
            color: #0066cc;
            font-size: 24px;
            margin-bottom: 20px;
        }
        input, button {
            padding: 12px;
            margin: 10px 0;
            width: 100%;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
        }
        button {
            background-color: #0066cc;
            color: white;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #0052a3;
        }
        #resultat {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: white;
            min-height: 60px;
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="logo_f193670e633a220d12e109007ca43583.svg" alt="Logo Amicial" style="max-width: 200px; margin-bottom: 20px;">
        <h1>Recherche d'Intervention</h1>
    </div>
    <input type="text" id="codePostal" placeholder="Entrez un code postal (ex: 01400)">
    <button onclick="rechercher()">Rechercher</button>
    <div id="resultat"></div>

    <script>
  async function rechercher() {
    const code = document.getElementById("codePostal").value.trim();
    const resultatDiv = document.getElementById("resultat");

    if (!code) {
        resultatDiv.innerHTML = "<p>Veuillez entrer un code postal.</p>";
        return;
    }

    try {
        // Remplace par ton lien de téléchargement direct Google Drive
        const googleDriveUrl = 'https://drive.google.com/uc?export=download&id=13s204l0763EufehKnxRLLNb_0mttET14';
        const response = await fetch(googleDriveUrl);
        if (!response.ok) {
            throw new Error("Erreur de chargement du fichier CSV.");
        }
        const data = await response.text();
        const lignes = data.split('\n');

        let trouve = false;
        for (let i = 1; i < lignes.length; i++) {
            const valeurs = lignes[i].split(',');
            if (valeurs[1] && valeurs[1].trim() === code) {
                const agence = valeurs[3];
                const actif = valeurs[4];
                resultatDiv.innerHTML = `
                    <p><strong>Code Postal :</strong> ${code}</p>
                    <p><strong>Ville :</strong> ${valeurs[2]}</p>
                    <p><strong>Agence :</strong> ${agence}</p>
                    <p><strong>Intervention :</strong> ${actif}</p>
                `;
                trouve = true;
                break;
            }
        }

        if (!trouve) {
            resultatDiv.innerHTML = "<p>Aucune intervention trouvée pour ce code postal.</p>";
        }
    } catch (error) {
        console.error("Erreur :", error);
        resultatDiv.innerHTML = "<p>Une erreur est survenue. Veuillez réessayer.</p>";
    }
}
</script>
</body>
</html>
